{% extends 'Base.html' %}
{% block content %}
<h2>{{ action }} Student</h2>

<form method="post">
    {% csrf_token %}
    <table style="border-collapse: separate; border-spacing: 0 15px;">
        <tr>
            <td><label for="student_name">Student Name:</label></td>
            <td><input type="text" name="student_name" value="{{ student.name|default:'' }}" required></td>
        </tr>
        <tr>
            <td><label for="student_email">Email:</label></td>
            <td><input type="email" name="student_email" value="{{ student.email|default:'' }}" required></td>
        </tr>
        <tr>
            <td><label for="education">Education:</label></td>
            <td><input type="text" name="education" value="{{ student.education|default:'' }}" required></td>
        </tr>
        <tr>
            <td><label for="course">Course:</label></td>
            <td><input type="text" name="course" value="{{ student.course|default:'' }}" required></td>
        </tr>
        <tr>
            <td><label for="fee_paid">Fee Paid:</label></td>
            <td><input type="number" step="0.01" name="fee_paid" value="{{ student.paid_fee|default:'' }}" required></td>
        </tr>
        <tr>
            <td><label for="total_fee">Total Fee:</label></td>
            <td><input type="number" step="0.01" name="total_fee" value="{{ student.total_fee|default:'' }}" required></td>
        </tr>
        <tr>
            <td></td>
            <td colspan="2" style="padding-top: 10px;">
                <button type="submit">{{ action }} Student</button>
                {% for message in messages %}
        <h5 style="color:red">{{ message }}</h5>
    {% endfor %}
            </td>
        </tr>

    </table>
</form>

{% endblock %}
